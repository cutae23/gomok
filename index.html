<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오목 vs Gemini</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --ink: #0d0d0d; --paper: #f5f0e8;
    --gold: #c8943a; --board: #d4a855; --board-dark: #b8892e;
    --gemini-blue: #4285f4; --gemini-glow: rgba(66,133,244,0.3);
    --win-red: #e53935;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--ink); color: var(--paper); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  header { width: 100%; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .logo { font-family: 'Space Mono', monospace; font-size: 17px; font-weight: 700; letter-spacing: 2px; color: var(--gold); }
  .gemini-tag { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--gemini-blue); font-weight: 700; }

  main { flex: 1; display: flex; gap: 24px; padding: 20px 16px; max-width: 1080px; width: 100%; align-items: flex-start; justify-content: center; flex-wrap: wrap; }

  .side-panel { width: 200px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; }

  .player-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; transition: border-color 0.3s, box-shadow 0.3s; }
  .player-card.active { border-color: var(--gold); box-shadow: 0 0 18px rgba(200,148,58,0.18); }
  .player-card.gemini-card.active { border-color: var(--gemini-blue); box-shadow: 0 0 18px var(--gemini-glow); }
  .player-label { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.35); margin-bottom: 6px; text-transform: uppercase; }
  .player-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .stone-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; }
  .stone-dot.black { background: radial-gradient(circle at 35% 30%, #666, #000); box-shadow: 1px 2px 4px rgba(0,0,0,0.8); }
  .stone-dot.white { background: radial-gradient(circle at 35% 30%, #fff, #ccc); box-shadow: 1px 2px 4px rgba(0,0,0,0.4); }

  .think-indicator { display: none; font-size: 11px; color: var(--gemini-blue); margin-top: 6px; font-family: 'Space Mono', monospace; }
  .think-indicator.visible { display: block; }
  .dot-anim::after { content: '...'; animation: dots 1.2s steps(4,end) infinite; }
  @keyframes dots { 0%,20%{content:''}30%,50%{content:'.'}60%,80%{content:'..'}90%,100%{content:'...'} }

  .move-counter { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; color: var(--gold); text-align: center; }
  .move-label { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-align: center; text-transform: uppercase; margin-top: 2px; }

  .history-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px; max-height: 190px; overflow-y: auto; }
  .history-box::-webkit-scrollbar { width: 3px; }
  .history-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  .history-title { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.3); margin-bottom: 6px; text-transform: uppercase; }
  .history-item { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-family: 'Space Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.5); border-bottom: 1px solid rgba(255,255,255,0.04); }
  .history-item:last-child { border-bottom: none; }
  .h-stone { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .h-black { background: #444; } .h-white { background: #ddd; }

  /* Board */
  .board-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .board-outer { background: var(--board); border-radius: 4px; padding: 24px; box-shadow: 0 0 0 3px var(--board-dark), 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.2); }
  #board-canvas { display: block; cursor: crosshair; }

  .status-bar { text-align: center; font-size: 14px; color: rgba(255,255,255,0.6); padding: 6px; min-height: 32px; font-weight: 500; }
  .status-bar.win { color: var(--gold); font-weight: 700; font-size: 15px; }
  .status-bar.lose { color: #ef5350; font-weight: 700; font-size: 15px; }

  .controls { display: flex; gap: 10px; justify-content: center; }
  .btn { font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700; padding: 9px 20px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--gold); color: var(--ink); }
  .btn-primary:hover { background: #d9a840; transform: translateY(-1px); }
  .btn-secondary { background: rgba(255,255,255,0.08); color: var(--paper); border: 1px solid rgba(255,255,255,0.12); }
  .btn-secondary:hover { background: rgba(255,255,255,0.13); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* Modal */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-backdrop.open { display: flex; }
  .modal { background: #111; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; width: 100%; max-width: 660px; max-height: 88vh; overflow-y: auto; padding: 28px; }
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .modal-title { font-size: 20px; font-weight: 900; }
  .modal-title span { color: var(--gold); }
  .modal-close { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 22px; cursor: pointer; }
  .modal-close:hover { color: white; }

  .analysis-loading { text-align: center; padding: 40px; }
  .spinner { width: 38px; height: 38px; border: 3px solid rgba(66,133,244,0.2); border-top-color: var(--gemini-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .analysis-content { display: none; }
  .analysis-content.visible { display: block; }

  .analysis-section { margin-bottom: 22px; }
  .analysis-section-title { font-size: 10px; letter-spacing: 3px; color: var(--gemini-blue); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .analysis-section-title::after { content: ''; flex: 1; height: 1px; background: rgba(66,133,244,0.2); }
  .analysis-text { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.78); }

  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .score-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 14px; }
  .score-label { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.35); text-transform: uppercase; margin-bottom: 6px; }
  .score-value { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; color: var(--gold); }
  .score-value.blue { color: var(--gemini-blue); }

  .key-moves { display: flex; flex-direction: column; gap: 8px; }
  .key-move { padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; border-left: 3px solid transparent; }
  .key-move.critical { border-left-color: var(--win-red); }
  .key-move.good { border-left-color: #43a047; }
  .key-move.mistake { border-left-color: #ff9800; }
  .move-badge { font-family: 'Space Mono', monospace; font-size: 10px; background: rgba(255,255,255,0.07); padding: 2px 8px; border-radius: 4px; color: rgba(255,255,255,0.6); }
  .move-desc { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; margin-top: 4px; }
  .error-msg { background: rgba(229,57,53,0.1); border: 1px solid rgba(229,57,53,0.3); border-radius: 8px; padding: 16px; color: #ef9a9a; font-size: 14px; line-height: 1.7; }
</style>
</head>
<body>

<header>
  <div class="logo">五目並べ</div>
  <div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.35)">HUMAN VS AI</div>
  <div class="gemini-tag">✦ GEMINI</div>
</header>

<main>
  <!-- Left Panel -->
  <div class="side-panel">
    <div class="player-card active" id="card-player">
      <div class="player-label">플레이어</div>
      <div class="player-name"><div class="stone-dot black"></div>흑돌</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px">선공</div>
    </div>
    <div style="text-align:center">
      <div class="move-counter" id="move-count">0</div>
      <div class="move-label">수(手)</div>
    </div>
    <div class="player-card gemini-card" id="card-gemini">
      <div class="player-label">상대</div>
      <div class="player-name"><div class="stone-dot white"></div>백돌</div>
      <div class="think-indicator" id="think-ind"><span class="dot-anim">생각 중</span></div>
      <div style="font-size:11px;color:rgba(66,133,244,0.5);margin-top:4px">Gemini AI</div>
    </div>
    <div class="history-box">
      <div class="history-title">기보</div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrap">
    <div class="board-outer">
      <canvas id="board-canvas"></canvas>
    </div>
    <div class="status-bar" id="status-bar">흑돌(나)의 차례입니다</div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="undoMove()">↩ 무르기</button>
      <button class="btn btn-primary" onclick="newGame()">새 게임</button>
      <button class="btn btn-secondary" id="btn-analyze" onclick="openAnalysis()" disabled>🔍 AI 분석</button>
    </div>
  </div>
</main>

<!-- Analysis Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">대국 <span>AI 분석</span></div>
      <button class="modal-close" onclick="closeAnalysis()">✕</button>
    </div>
    <div class="analysis-loading" id="analysis-loading">
      <div class="spinner"></div>
      <div style="color:rgba(255,255,255,0.5);font-size:14px">Claude가 대국을 분석 중입니다<span class="dot-anim"></span></div>
    </div>
    <div class="analysis-content" id="analysis-content"></div>
  </div>
</div>

<script>
// ── Constants ──
const N = 15;         // 15x15 board
const CELL = 34;      // pixels between intersections
const PAD  = 28;      // padding inside board-outer (canvas offset)
const STONE_R = 14;   // stone radius

// Canvas size = (N-1) lines * CELL  (intersections only)
const CV = (N - 1) * CELL;

const canvas = document.getElementById('board-canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = CV;
canvas.height = CV;

// ── State ──
let board       = [];
let currentPlayer = 1; // 1=black(human), 2=white(AI)
let gameOver    = false;
let moveHistory = [];
let winStones   = [];
let hoverCell   = null;
let thinkTimer  = null;

// ── Init ──
function newGame() {
  clearTimeout(thinkTimer);
  board         = Array.from({length:N}, () => new Array(N).fill(0));
  currentPlayer = 1;
  gameOver      = false;
  moveHistory   = [];
  winStones     = [];
  hoverCell     = null;

  document.getElementById('history-list').innerHTML = '';
  document.getElementById('think-ind').classList.remove('visible');
  document.getElementById('btn-analyze').disabled = true;
  document.getElementById('move-count').textContent = '0';
  setStatus('흑돌(나)의 차례입니다');
  setActive(1);
  drawBoard();
}

// ── Coord helpers ──
// pixel position of intersection (r,c)
function px(c) { return c * CELL; }
function py(r) { return r * CELL; }

// nearest intersection from mouse pixel (mx, my)
function nearestCell(mx, my) {
  const c = Math.round(mx / CELL);
  const r = Math.round(my / CELL);
  if (r < 0 || r >= N || c < 0 || c >= N) return null;
  return {r, c};
}

// ── Draw ──
function drawBoard() {
  ctx.clearRect(0, 0, CV, CV);

  // Grid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.38)';
  ctx.lineWidth   = 1;
  for (let i = 0; i < N; i++) {
    ctx.beginPath(); ctx.moveTo(px(i), 0);       ctx.lineTo(px(i), CV); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,     py(i));   ctx.lineTo(CV,    py(i)); ctx.stroke();
  }

  // Star points
  const stars = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  stars.forEach(([r,c]) => {
    ctx.beginPath();
    ctx.arc(px(c), py(r), 3.5, 0, Math.PI*2);
    ctx.fill();
  });

  // Ghost stone
  if (hoverCell && !gameOver && currentPlayer === 1 && board[hoverCell.r][hoverCell.c] === 0) {
    ctx.save();
    ctx.globalAlpha = 0.35;
    drawStone(ctx, hoverCell.r, hoverCell.c, 1);
    ctx.restore();
  }

  // Stones
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (board[r][c] !== 0) {
        const isWin = winStones.some(([wr,wc]) => wr===r && wc===c);
        drawStone(ctx, r, c, board[r][c], isWin);
      }
    }
  }

  // Last move marker
  if (moveHistory.length > 0) {
    const last = moveHistory[moveHistory.length - 1];
    ctx.strokeStyle = last.player === 1 ? 'rgba(255,200,0,0.85)' : 'rgba(80,80,80,0.85)';
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.arc(px(last.c), py(last.r), 5, 0, Math.PI*2);
    ctx.stroke();
  }
}

function drawStone(ctx, r, c, player, isWin = false) {
  const x = px(c), y = py(r);
  const grad = ctx.createRadialGradient(x - STONE_R*0.3, y - STONE_R*0.3, STONE_R*0.05, x, y, STONE_R);

  if (player === 1) {
    grad.addColorStop(0, '#888');
    grad.addColorStop(1, '#000');
  } else {
    grad.addColorStop(0, '#fff');
    grad.addColorStop(1, '#bbb');
  }

  ctx.beginPath();
  ctx.arc(x, y, STONE_R, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.shadowColor   = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur    = 6;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 3;
  ctx.fill();
  ctx.shadowColor = 'transparent';

  if (isWin) {
    ctx.strokeStyle = '#e53935';
    ctx.lineWidth   = 3;
    ctx.stroke();
  }
}

// ── Mouse events ──
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx   = (e.clientX - rect.left) * (CV / rect.width);
  const my   = (e.clientY - rect.top)  * (CV / rect.height);
  hoverCell  = nearestCell(mx, my);
  drawBoard();
});

canvas.addEventListener('mouseleave', () => { hoverCell = null; drawBoard(); });

canvas.addEventListener('click', e => {
  if (gameOver || currentPlayer !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const mx   = (e.clientX - rect.left) * (CV / rect.width);
  const my   = (e.clientY - rect.top)  * (CV / rect.height);
  const cell = nearestCell(mx, my);
  if (!cell || board[cell.r][cell.c] !== 0) return;
  doMove(cell.r, cell.c, 1);
});

// ── Move logic ──
function doMove(r, c, player) {
  board[r][c] = player;
  const num   = moveHistory.length + 1;
  moveHistory.push({r, c, player, num});
  addHistory(r, c, player, num);
  document.getElementById('move-count').textContent = num;
  drawBoard();

  if (checkWin(r, c, player)) { endGame(player === 1 ? 'win' : 'lose'); return; }
  if (moveHistory.length === N * N) { endGame('draw'); return; }

  if (player === 1) {
    currentPlayer = 2;
    setActive(2);
    setStatus('Gemini AI가 생각 중입니다...');
    document.getElementById('think-ind').classList.add('visible');
    thinkTimer = setTimeout(aiMove, 500 + Math.random() * 500);
  } else {
    currentPlayer = 1;
    setActive(1);
    setStatus('흑돌(나)의 차례입니다');
  }
}

// ── AI ──
function aiMove() {
  document.getElementById('think-ind').classList.remove('visible');
  const move = getBestMove();
  if (move) doMove(move.r, move.c, 2);
}

function getBestMove() {
  let best = null, bestScore = -Infinity;
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (board[r][c] !== 0) continue;
      const s = scorePos(r, c, 2) * 2.2 + scorePos(r, c, 1) * 1.9 + proximity(r, c) * 0.4;
      if (s > bestScore) { bestScore = s; best = {r, c}; }
    }
  }
  return best;
}

function scorePos(r, c, p) {
  board[r][c] = p;
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  let total = 0;
  for (const [dr, dc] of dirs) {
    let cnt = 1, open = 0;
    for (let d = 1; d < 5; d++) {
      const nr = r+dr*d, nc = c+dc*d;
      if (nr<0||nr>=N||nc<0||nc>=N) break;
      if (board[nr][nc] === p) cnt++;
      else { if (board[nr][nc] === 0) open++; break; }
    }
    for (let d = 1; d < 5; d++) {
      const nr = r-dr*d, nc = c-dc*d;
      if (nr<0||nr>=N||nc<0||nc>=N) break;
      if (board[nr][nc] === p) cnt++;
      else { if (board[nr][nc] === 0) open++; break; }
    }
    const w = [0,1,10,100,1000,100000];
    total += w[Math.min(cnt, 5)] * (open > 0 ? 1 : 0.5);
  }
  board[r][c] = 0;
  return total;
}

function proximity(r, c) {
  let s = 0;
  for (let dr = -2; dr <= 2; dr++)
    for (let dc = -2; dc <= 2; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr>=0&&nr<N&&nc>=0&&nc<N&&board[nr][nc]!==0) s++;
    }
  return s;
}

// ── Win check ──
function checkWin(r, c, p) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let stones = [[r, c]];
    for (let d = 1; d < 5; d++) {
      const nr = r+dr*d, nc = c+dc*d;
      if (nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==p) break;
      stones.push([nr, nc]);
    }
    for (let d = 1; d < 5; d++) {
      const nr = r-dr*d, nc = c-dc*d;
      if (nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==p) break;
      stones.push([nr, nc]);
    }
    if (stones.length >= 5) { winStones = stones; return true; }
  }
  return false;
}

function endGame(result) {
  gameOver = true;
  clearTimeout(thinkTimer);
  document.getElementById('think-ind').classList.remove('visible');
  document.getElementById('btn-analyze').disabled = false;
  document.getElementById('card-player').classList.remove('active');
  document.getElementById('card-gemini').classList.remove('active');

  // Win animation loop
  if (winStones.length > 0) {
    let frame = 0;
    (function animate() {
      if (!gameOver) return;
      frame++;
      ctx.clearRect(0, 0, CV, CV);
      // redraw board without win highlight
      drawBoardStatic();
      // pulsing win stones
      const alpha = 0.5 + 0.5 * Math.sin(frame * 0.15);
      winStones.forEach(([wr, wc]) => {
        ctx.save();
        ctx.shadowColor   = '#e53935';
        ctx.shadowBlur    = 14 * alpha;
        drawStone(ctx, wr, wc, board[wr][wc]);
        ctx.strokeStyle   = `rgba(229,57,53,${alpha})`;
        ctx.lineWidth     = 3;
        ctx.beginPath();
        ctx.arc(px(wc), py(wr), STONE_R, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      });
      requestAnimationFrame(animate);
    })();
  }

  if (result === 'win')   setStatus('🎉 승리! 5개를 연속으로 놓았습니다!', 'win');
  else if (result==='lose') setStatus('💙 Gemini의 승리! 다시 도전해보세요', 'lose');
  else                    setStatus('비겼습니다!');
}

function drawBoardStatic() {
  ctx.strokeStyle = 'rgba(0,0,0,0.38)';
  ctx.lineWidth   = 1;
  for (let i = 0; i < N; i++) {
    ctx.beginPath(); ctx.moveTo(px(i), 0);     ctx.lineTo(px(i), CV); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,     py(i)); ctx.lineTo(CV,    py(i)); ctx.stroke();
  }
  const stars = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  stars.forEach(([r,c]) => { ctx.beginPath(); ctx.arc(px(c), py(r), 3.5, 0, Math.PI*2); ctx.fill(); });
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (board[r][c] !== 0) drawStone(ctx, r, c, board[r][c]);
}

// ── Undo ──
function undoMove() {
  if (gameOver || moveHistory.length === 0) return;
  const removeCount = (moveHistory.length >= 2 && moveHistory[moveHistory.length-1].player === 2) ? 2 : 1;
  for (let i = 0; i < removeCount; i++) {
    if (!moveHistory.length) break;
    const last = moveHistory.pop();
    board[last.r][last.c] = 0;
    const list = document.getElementById('history-list');
    if (list.lastChild) list.removeChild(list.lastChild);
  }
  currentPlayer = 1;
  setActive(1);
  document.getElementById('move-count').textContent = moveHistory.length;
  setStatus('흑돌(나)의 차례입니다');
  drawBoard();
}

// ── Helpers ──
function setStatus(msg, cls='') {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className   = 'status-bar ' + cls;
}

function setActive(p) {
  document.getElementById('card-player').classList.toggle('active', p === 1);
  document.getElementById('card-gemini').classList.toggle('active', p === 2);
}

function addHistory(r, c, player, num) {
  const cols = 'ABCDEFGHIJKLMNO';
  const list = document.getElementById('history-list');
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `<div class="h-stone ${player===1?'h-black':'h-white'}"></div><span>${num}. ${cols[c]}${r+1}</span><span style="margin-left:auto;font-size:10px;color:rgba(255,255,255,0.3)">${player===1?'나':'AI'}</span>`;
  list.appendChild(item);
  list.scrollTop = list.scrollHeight;
}

// ── Analysis ──
async function openAnalysis() {
  document.getElementById('modal-backdrop').classList.add('open');
  document.getElementById('analysis-loading').style.display = 'block';
  document.getElementById('analysis-content').classList.remove('visible');
  document.getElementById('analysis-content').innerHTML = '';

  const cols = 'ABCDEFGHIJKLMNO';
  const gameRecord  = moveHistory.map(m=>`${m.num}.${cols[m.c]}${m.r+1}(${m.player===1?'흑':'백'})`).join(', ');
  const playerMoves = moveHistory.filter(m=>m.player===1).length;
  const aiMoves     = moveHistory.filter(m=>m.player===2).length;
  const lastMove    = moveHistory[moveHistory.length-1];
  const winner      = winStones.length > 0 ? (lastMove?.player===1 ? '흑(사람)' : '백(Gemini AI)') : '무승부';

  const prompt = `당신은 오목(Gomoku) 전문 해설가입니다. 다음 대국을 분석해주세요.

[대국 정보]
- 보드: 15x15
- 총 수: ${moveHistory.length}수 (흑:${playerMoves}수, 백:${aiMoves}수)
- 결과: ${winner}
- 기보(좌표 열=A~O 숫자=1~15): ${gameRecord}

다음 JSON 형식으로만 응답하세요. 마크다운 없이 순수 JSON만:
{
  "overall": "전체 대국 총평 (100자 내외)",
  "player_score": 숫자(0-100),
  "ai_score": 숫자(0-100),
  "player_strong": "플레이어 강점 (60자 내외)",
  "player_weak": "플레이어 약점 (60자 내외)",
  "key_moments": [
    {"move": "N수 X좌표", "type": "critical|good|mistake", "desc": "설명 (70자 내외)"},
    {"move": "N수 X좌표", "type": "critical|good|mistake", "desc": "설명 (70자 내외)"},
    {"move": "N수 X좌표", "type": "critical|good|mistake", "desc": "설명 (70자 내외)"}
  ],
  "advice": "다음 대국을 위한 구체적 조언 (90자 내외)"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`API 오류 ${res.status}: ${errText}`);
    }

    const data = await res.json();
    const raw  = (data.content || []).map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const analysis = JSON.parse(clean);
    renderAnalysis(analysis);

  } catch(e) {
    document.getElementById('analysis-loading').style.display = 'none';
    const errEl = document.getElementById('analysis-content');
    errEl.innerHTML = `<div class="error-msg">분석 중 오류가 발생했습니다.<br><br>${e.message}</div>`;
    errEl.classList.add('visible');
  }
}

function renderAnalysis(a) {
  document.getElementById('analysis-loading').style.display = 'none';
  const typeLabel = { critical:'결정적 순간', good:'좋은 수', mistake:'실수' };
  const typeColor = { critical:'#ef5350', good:'#66bb6a', mistake:'#ffa726' };

  const html = `
    <div class="score-grid">
      <div class="score-item">
        <div class="score-label">나의 기력</div>
        <div class="score-value">${a.player_score}<span style="font-size:13px;opacity:0.5">/100</span></div>
      </div>
      <div class="score-item">
        <div class="score-label">Gemini 기력</div>
        <div class="score-value blue">${a.ai_score}<span style="font-size:13px;opacity:0.5">/100</span></div>
      </div>
    </div>
    <div class="analysis-section">
      <div class="analysis-section-title">총평</div>
      <div class="analysis-text">${a.overall}</div>
    </div>
    <div class="analysis-section">
      <div class="analysis-section-title">플레이어 분석</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:rgba(67,160,71,0.08);border:1px solid rgba(67,160,71,0.2);border-radius:8px;padding:12px">
          <div style="font-size:9px;letter-spacing:2px;color:#66bb6a;margin-bottom:6px">강점</div>
          <div class="analysis-text" style="font-size:13px">${a.player_strong}</div>
        </div>
        <div style="background:rgba(239,83,80,0.08);border:1px solid rgba(239,83,80,0.2);border-radius:8px;padding:12px">
          <div style="font-size:9px;letter-spacing:2px;color:#ef5350;margin-bottom:6px">약점</div>
          <div class="analysis-text" style="font-size:13px">${a.player_weak}</div>
        </div>
      </div>
    </div>
    <div class="analysis-section">
      <div class="analysis-section-title">핵심 수(手)</div>
      <div class="key-moves">
        ${(a.key_moments||[]).map(m=>`
          <div class="key-move ${m.type}">
            <span class="move-badge">${m.move}</span>
            <span style="font-size:10px;color:${typeColor[m.type]||'#aaa'};margin-left:6px">${typeLabel[m.type]||m.type}</span>
            <div class="move-desc">${m.desc}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="analysis-section">
      <div class="analysis-section-title">다음 대국 조언</div>
      <div style="background:rgba(66,133,244,0.08);border:1px solid rgba(66,133,244,0.2);border-radius:10px;padding:14px">
        <div class="analysis-text">${a.advice}</div>
      </div>
    </div>`;

  const el = document.getElementById('analysis-content');
  el.innerHTML = html;
  el.classList.add('visible');
}

function closeAnalysis() {
  document.getElementById('modal-backdrop').classList.remove('open');
}

// ── Start ──
newGame();
</script>
